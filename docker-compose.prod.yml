services:
  waha:
    image: devlikeapro/waha:arm
    container_name: waha
    restart: unless-stopped
    environment:
      # Secure Dashboard with Password
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      - WHATSAPP_SWAGGER_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WHATSAPP_SWAGGER_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      # API Key
      - WAHA_API_KEY=${WAHA_API_KEY}
      # Use container name so this works both locally and on VPS without needing an external network
      - WHATSAPP_HOOK_URL=http://vistabot:5001/webhook
      - WHATSAPP_HOOK_EVENTS=message
      # GOWS Engine: Ultra-lightweight Go-based engine, no Chrome needed
      - WHATSAPP_DEFAULT_ENGINE=GOWS
      # ANTI-BAN: Tell WAHA to completely ignore Status broadcasts and Channels.
      # Without this, reconnecting after hours offline dumps 30-100+ status messages
      # into our webhook, overloading WAHA and triggering WhatsApp's anti-bot detection.
      - WHATSAPP_IGNORE_STATUS=true
      - WHATSAPP_IGNORE_CHANNELS=true
      # GOWS: Minimal history sync to reduce bandwidth and ban risk on datacenter IPs
      - WAHA_GOWS_DEVICE_REQUIRE_FULL_SYNC=false
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_DAYS_LIMIT=1
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_RECENT_SYNC_DAYS_LIMIT=1
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_INITIAL_SYNC_MAX_MESSAGES_PER_CHAT=10
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_SIZE_MB_LIMIT=64
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_STORAGE_QUOTA_MB=128
    volumes:
      - ./waha_sessions:/app/.sessions
    # GOWS is ultra-lightweight (~30MB RAM), no Chrome/Chromium needed
    mem_limit: 256m
    ports:
      - "3000:3000"
    depends_on:
      - vista_bot
    networks:
      - proxy-network

  vista_bot:
    build: .
    container_name: vista_bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Jakarta
      - WAHA_URL=http://waha:3000
    volumes:
      # Keep the database, env variables, and auth tokens synchronized and persistent
      - ./processed_messages.db:/app/processed_messages.db
      - ./.env:/app/.env
      - ./token_cache.bin:/app/token_cache.bin
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: 512m
    networks:
      proxy-network:
        aliases:
          - vistabot

networks:
  proxy-network:
    name: proxy-network
    driver: bridge

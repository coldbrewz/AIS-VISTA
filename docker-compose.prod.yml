version: '3.8'

services:
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Secure Dashboard with Password
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      - WHATSAPP_SWAGGER_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WHATSAPP_SWAGGER_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      # API Key
      - WAHA_API_KEY=${WAHA_API_KEY}
      # CRITICAL: In Docker, WAHA must use the container name "vista_bot" to reach the Python server, not "localhost"
      - WHATSAPP_HOOK_URL=http://vista_bot:5001/webhook
      - WHATSAPP_HOOK_EVENTS=message
      - WHATSAPP_DEFAULT_ENGINE=WPP
    volumes:
      - ./waha_sessions:/app/.sessions
    depends_on:
      - vista_bot

  vista_bot:
    build: .
    container_name: vista_bot
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # Keep the database, env variables, and auth tokens synchronized and persistent
      - ./processed_messages.db:/app/processed_messages.db
      - ./.env:/app/.env
      - ./token_cache.bin:/app/token_cache.bin
      - /var/run/docker.sock:/var/run/docker.sock

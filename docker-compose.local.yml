services:
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      - WHATSAPP_SWAGGER_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WHATSAPP_SWAGGER_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WHATSAPP_HOOK_URL=http://vistabot:5001/webhook
      - WHATSAPP_HOOK_EVENTS=message
      - WHATSAPP_DEFAULT_ENGINE=WPP
    volumes:
      - ./waha_sessions:/app/.sessions
    mem_limit: 2.5g
    shm_size: 512m
    depends_on:
      - vista_bot
    networks:
      - vista-network

  vista_bot:
    build: .
    container_name: vista_bot
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./processed_messages.db:/app/processed_messages.db
      - ./.env:/app/.env
      - ./token_cache.bin:/app/token_cache.bin
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: 512m
    networks:
      vista-network:
        aliases:
          - vistabot

networks:
  vista-network:
    driver: bridge


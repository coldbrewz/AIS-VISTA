# Local GOWS testing: Only runs WAHA container. Python bot runs natively.
# Usage: docker compose -f docker-compose.local.yml up -d
#        Then run: python main.py
services:
  waha:
    image: devlikeapro/waha
    container_name: waha_local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Dashboard
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      - WHATSAPP_SWAGGER_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WHATSAPP_SWAGGER_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-admin123}
      # API Key
      - WAHA_API_KEY=${WAHA_API_KEY}
      # Webhook → points to host machine where Python runs natively
      - WHATSAPP_HOOK_URL=http://host.docker.internal:5001/webhook
      - WHATSAPP_HOOK_EVENTS=message
      # GOWS Engine
      - WHATSAPP_DEFAULT_ENGINE=GOWS
      # ANTI-BAN: Ignore status broadcasts and channels
      - WHATSAPP_IGNORE_STATUS=true
      - WHATSAPP_IGNORE_CHANNELS=true
      # GOWS: Minimal history sync to reduce bandwidth and ban risk
      - WAHA_GOWS_DEVICE_REQUIRE_FULL_SYNC=false
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_DAYS_LIMIT=1
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_RECENT_SYNC_DAYS_LIMIT=1
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_INITIAL_SYNC_MAX_MESSAGES_PER_CHAT=10
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_SIZE_MB_LIMIT=64
      - WAHA_GOWS_DEVICE_HISTORY_SYNC_STORAGE_QUOTA_MB=128
    volumes:
      - ./waha_sessions_gows:/app/.sessions
    # GOWS is ultra-lightweight, no Chrome needed
    mem_limit: 256m
